<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1a1a2e"/>
  <!-- Dumbbell centered, slightly tilted -->
  <g transform="translate(90,90) rotate(-28)">
    <!-- Left outer plate -->
    <rect x="-68" y="-31" width="19" height="62" rx="7" fill="#4361ee"/>
    <!-- Left inner plate (collar) -->
    <rect x="-49" y="-23" width="11" height="46" rx="5" fill="#6b7ef5"/>
    <!-- Bar -->
    <rect x="-38" y="-8" width="76" height="16" rx="5" fill="white"/>
    <!-- Right inner plate (collar) -->
    <rect x="38" y="-23" width="11" height="46" rx="5" fill="#6b7ef5"/>
    <!-- Right outer plate -->
    <rect x="49" y="-31" width="19" height="62" rx="7" fill="#4361ee"/>
  </g>
</svg>
